<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="profile.css">
</head>
<body>

  <div class="profile-card card">
    <div class="card-body text-center">
      <h4 class="brand mb-4">👤 My Profile</h4>

      <img id="pic"
        src="https://ui-avatars.com/api/?name=User&background=4f46e5&color=fff&size=110"
        onclick="document.getElementById('fileInput').click()"
        title="Click to change photo" />
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewPic(event)" />

      <input type="text"  id="username" class="form-control mb-3" placeholder="Username" />
      <input type="email" id="email"    class="form-control mb-3" placeholder="Email" />
      <input type="tel"   id="phone"    class="form-control mb-3" placeholder="Phone Number" />

      <button class="btn btn-primary btn-block" onclick="saveProfile()">💾 Save Profile</button>
      <button class="btn btn-outline-secondary btn-block mt-2" onclick="logout()">Logout</button>

      <p id="msg" class="mt-3"></p>
    </div>
  </div>

<script>
  const userId = localStorage.getItem('userId');
  if (!userId) window.location.href = '/auth.html'; // not logged in → go to login

  window.onload = async () => {
    const res  = await fetch(`/profile/${userId}`);
    const data = await res.json();
    if (data.username) document.getElementById('username').value = data.username;
    if (data.email)    document.getElementById('email').value    = data.email;
    if (data.phone)    document.getElementById('phone').value    = data.phone;
    if (data.picture)  document.getElementById('pic').src        = `/uploads/${data.picture}`;
  };

  function previewPic(e) {
    const reader = new FileReader();
    reader.onload = ev => document.getElementById('pic').src = ev.target.result;
    reader.readAsDataURL(e.target.files[0]);
  }

  async function saveProfile() {
    const form = new FormData();
    form.append('user_id',  userId);
    form.append('username', document.getElementById('username').value);
    form.append('email',    document.getElementById('email').value);
    form.append('phone',    document.getElementById('phone').value);
    const file = document.getElementById('fileInput').files[0];
    if (file) form.append('picture', file);

    const res  = await fetch('/profile/save', { method: 'POST', body: form });
    const data = await res.json();
    document.getElementById('msg').textContent = data.message;
    document.getElementById('msg').style.color = res.ok ? 'green' : 'red';
  }

  function logout() {
    localStorage.removeItem('userId');
    window.location.href = '/auth.html';
  }
</script>
</body>
</html>
