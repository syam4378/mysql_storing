<!DOCTYPE html>
<html>
<head><title>Auth</title></head>
<body>

  <h2>Signup</h2>
  <input id="s-username" placeholder="Username" />
  <input id="s-email" placeholder="Email" />
  <input id="s-password" type="password" placeholder="Password" />
  <button onclick="signup()">Sign Up</button>

  <h2>Login</h2>
  <input id="l-email" placeholder="Email" />
  <input id="l-password" type="password" placeholder="Password" />
  <button onclick="login()">Login</button>

  <p id="msg"></p>

<script>
  async function signup() {
    const res = await fetch('/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('s-username').value,
        email: document.getElementById('s-email').value,
        password: document.getElementById('s-password').value
      })
    });
    const data = await res.json();
    document.getElementById('msg').textContent = data.message;
  }

  async function login() {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('l-email').value,
        password: document.getElementById('l-password').value
      })
    });
    const data = await res.json();
    document.getElementById('msg').textContent = data.message;
  }
</script>
</body>
</html>
